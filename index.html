<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI slop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d10;
      --surface: #16161c;
      --surface2: #1f1f28;
      --border: rgba(255,255,255,0.08);
      --accent: #c8ff00;
      --accent2: #7c3aed;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 72px 24px 48px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 12vw, 120px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .tagline {
      margin-top: 20px;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 40px auto;
      position: relative;
      z-index: 1;
    }

    .games-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .game-card:hover {
      transform: translateY(-6px);
      border-color: rgba(200,255,0,0.35);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,255,0,0.15);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface2);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 24px,
        rgba(255,255,255,0.02) 24px,
        rgba(255,255,255,0.02) 25px
      );
    }

    .thumb-icon {
      font-size: 48px;
      opacity: 1;
      position: relative;
      z-index: 1;
      user-select: none;
    }

    .shrug-icon {
      display: inline-block;
      font-size: 110px;
    }
    .shrug-num {
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      color: #c084fc;
      opacity: 1;
      top: 30px;
    }
    .shrug-num-left { left: 2px; }
    .shrug-num-right { right: 2px; }

    .card-mieze .thumb {
      background: linear-gradient(135deg, #1a1020 0%, #2a1540 100%);
    }
    .card-mieze .thumb::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, rgba(124,58,237,0.25), transparent);
    }

    .card-20ab .thumb {
      background: linear-gradient(135deg, #0a1a10 0%, #0a2a1a 100%);
    }
    .card-20ab .thumb::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, rgba(200,255,0,0.18), transparent);
    }

    .card-busfahrer .thumb {
      background: linear-gradient(135deg, #1a1508 0%, #2a2010 100%);
    }
    .card-busfahrer .thumb::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, rgba(212,175,55,0.25), transparent);
    }

    .card-body { padding: 20px 22px 22px; }

    .card-number {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 10px;
    }

    .card-mieze .card-title { color: #c084fc; }
    .card-20ab  .card-title { color: var(--accent); }
    .card-busfahrer .card-title { color: #d4af37; }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.15s;
    }

    .game-card:hover .card-cta { color: var(--text); }
    .card-cta svg { transition: transform 0.15s; }
    .game-card:hover .card-cta svg { transform: translateX(4px); }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding-bottom: 40px;
      font-size: 12px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.08em;
    }

    @media (prefers-reduced-motion: reduce) { .game-card { transition: none; } }
    @media (max-width: 480px) {
      header { padding: 48px 20px 32px; }
      .games-grid { gap: 16px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>AI<br><span>slop</span></h1>
  </header>

  <div class="divider"></div>

  <main class="games-grid">

    <a class="game-card card-mieze" href="MiezeGame.html">
      <div class="thumb">
        <div class="thumb-icon shrug-icon">
          <span class="shrug-num shrug-num-left">1</span>
          <span class="shrug-num shrug-num-right">2</span>
          🤷‍♂️
        </div>
      </div>
      <div class="card-body">
        <p class="card-number">Spiel 01</p>
        <h2 class="card-title">Mieze</h2>
        <span class="card-cta">
          Jetzt spielen
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
    </a>

    <a class="game-card card-20ab" href="20ab.html">
      <div class="thumb">
        <img class="thumb-icon" src="assets/ace_hearts.png" alt="" style="width: 140px; height: auto; opacity: 1;">
      </div>
      <div class="card-body">
        <p class="card-number">Spiel 02</p>
        <h2 class="card-title">20ab</h2>
        <span class="card-cta">
          Jetzt spielen
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
    </a>

    <a class="game-card card-busfahrer" href="busfahrer.html">
      <div class="thumb">
        <div class="thumb-icon" style="font-size: 90px;">🚌</div>
      </div>
      <div class="card-body">
        <p class="card-number">Spiel 03</p>
        <h2 class="card-title">Busfahrer</h2>
        <span class="card-cta">
          Jetzt spielen
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
    </a>

  </main>

  <footer>© AI slop</footer>

</body>
</html>
