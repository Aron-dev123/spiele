<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="20 Ab">
<meta name="theme-color" content="#0f2027">
<title>🃏 20 Ab - Stammtisch Edition</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  body { 
    background: linear-gradient(135deg, #0f2027 0%, #112233 50%, #1f4068 100%); 
    color: #e9f5db; 
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
    background-attachment: fixed;
    overflow-x: hidden;
  }
  input, textarea, button { font-family: inherit; }
  input:focus { outline: none; border-color: #00f2fe !important; box-shadow: 0 0 15px rgba(0, 242, 254, 0.8); }
  button:active { transform: scale(0.95); }
  
  .glass {
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    position: relative;
    z-index: 10;
    margin-bottom: 20px;
  }
  
  .neon-text {
    text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe, 0 0 30px #4facfe;
    color: #fff;
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: 3px;
    text-align: center;
  }

  .pulse-btn { animation: pulse 2s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 10px rgba(0, 242, 254, 0.4); }
    50% { box-shadow: 0 0 25px rgba(0, 242, 254, 0.8); }
    100% { box-shadow: 0 0 10px rgba(0, 242, 254, 0.4); }
  }

  .suit-container {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    overflow: hidden;
    z-index: 1;
    pointer-events: none;
  }
  .floating-suit {
    position: absolute;
    bottom: -10%;
    font-size: 3rem;
    animation: floatUp 12s infinite linear;
  }
  .floating-suit.red { color: rgba(255, 78, 80, 0.12); text-shadow: 0 0 10px rgba(255, 78, 80, 0.2); }
  .floating-suit.blue { color: rgba(0, 242, 254, 0.10); text-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
  }
</style>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SUITS = [
  { id: "eichel", label: "Eichel", emoji: "🌰", color: "#a0522d", double: false },
  { id: "herz", label: "Herz", emoji: "❤️", color: "#ff0844", double: true },
  { id: "bollen", label: "Bollen", emoji: "🔔", color: "#ff512f", double: false },
  { id: "blatt", label: "Blatt", emoji: "🍃", color: "#0ba360", double: false }
];

const MAX_POINTS = 20;
const CENT_PER_POINT = 0.10;

function uid() { return Math.random().toString(36).slice(2, 9); }
function euro(val) { const sign = val >= 0 ? "+" : ""; return sign + val.toFixed(2).replace(".", ",") + " €"; }

// Berechnet die dynamischen Spielstände basierend auf der Rundenhistorie eines Spiels
function calculateScoresFromRounds(players, rounds) {
  let currentScores = players.map(() => MAX_POINTS);
  let currentRaus = {};
  players.forEach(p => currentRaus[p.id] = 0);

  rounds.forEach((r) => {
    const multiplier = r.trump.double ? 2 : 1;
    players.forEach((p, idx) => {
      const forcedByTrump = r.trump.id === "eichel";
      const forcedByPoints = currentScores[idx] <= 6;
      const forcedByRaus = currentRaus[p.id] >= 2;
      const isForced = forcedByTrump || forcedByPoints || forcedByRaus;
      
      const status = isForced ? "mit" : r.playerStatus[p.id];
      const tricks = r.playerTricks[p.id] || 0;

      if (status === "mit") {
        currentRaus[p.id] = 0;
        if (tricks > 0) {
          currentScores[idx] -= (tricks * multiplier);
        } else {
          currentScores[idx] += (6 * multiplier);
        }
      } else {
        currentRaus[p.id] = (currentRaus[p.id] || 0) + 1;
      }
    });
  });
  return { scores: currentScores, consecutiveRaus: currentRaus };
}

// Hilfsfunktion zur Neuberechnung aller Kontostände aus den Spieler-Historien
function refreshBalances(allPlayers) {
  return allPlayers.map(p => {
    const totalBalance = (p.games || []).reduce((sum, g) => sum + g.moneyDelta, 0);
    return { ...p, session: { balance: totalBalance } };
  });
}

function BackgroundEffects() {
  const suits = [{ symbol: '🌰', color: 'blue' }, { symbol: '🔔', color: 'red' }, { symbol: '♥', color: 'red' }, { symbol: '🍃', color: 'blue' }];
  return (
    <div className="suit-container">
      {Array.from({ length: 16 }).map((_, i) => {
        const suit = suits[Math.floor(Math.random() * suits.length)];
        return (
          <div key={i} className={`floating-suit ${suit.color}`} style={{ left: `${Math.random() * 100}%`, animationDuration: `${10 + Math.random() * 10}s`, animationDelay: `-${Math.random() * 12}s`, fontSize: `${1.5 + Math.random() * 2.5}rem` }}>
            {suit.symbol}
          </div>
        );
      })}
    </div>
  );
}

// ── Firebase Setup ──────────────────────────────────────────
// Zentrale Cloud-Datenbank: alle Geräte, die diese Seite öffnen, lesen/schreiben
// denselben Datensatz unter dem Pfad "20ab/registry".
const firebaseConfig = {
  databaseURL: "https://schaefer-games-default-rtdb.europe-west1.firebasedatabase.app/"
};
let db = null;
let registryRef = null;
let firebaseInitError = null;
try {
  if (typeof firebase === "undefined") {
    throw new Error("Firebase SDK wurde nicht geladen (CDN-Skript fehlgeschlagen oder blockiert).");
  }
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  registryRef = db.ref("20ab/registry");
} catch (e) {
  firebaseInitError = e.message;
  console.error("Firebase-Initialisierung fehlgeschlagen:", e);
}

const STORAGE_KEY = "20ab-final-data"; // (nur noch als Bezeichner verwendet, kein localStorage mehr)

function App() {
  const [screen, setScreen] = useState("home");
  const [registry, setRegistryRaw] = useState([]);
  const [syncState, setSyncState] = useState("loading"); // loading | ready | error

  const [newName, setNewName] = useState("");
  const [selectedIds, setSelectedIds] = useState([]);
  
  // Game States
  const [gamePlayers, setGamePlayers] = useState([]);
  const [gameRounds, setGameRounds] = useState([]); 
  const [dealerIdx, setDealerIdx] = useState(0);
  const [roundPhase, setRoundPhase] = useState("setup"); 
  const [selectedTrump, setSelectedTrump] = useState(SUITS[0]);
  const [playerStatus, setPlayerStatus] = useState({}); 
  const [playerTricks, setPlayerTricks] = useState({}); 

  // Edit States für alte Spiele
  const [editingGameId, setEditingGameId] = useState(null);
  const [editScores, setEditScores] = useState({});

  // Edit States für laufende Runden
  const [editingRoundIdx, setEditingRoundIdx] = useState(null);

  // ── Firebase: Live-Listener auf die Registry ──
  // onValue feuert sofort beim ersten Laden UND danach jedes Mal, wenn sich
  // irgendein anderes Gerät ändert -> echte Echtzeit-Synchronisation, kein Polling nötig.
  useEffect(() => {
    if (!registryRef) {
      setSyncState("error");
      return;
    }
    const callback = (snapshot) => {
      const data = snapshot.val();
      if (data) {
        setRegistryRaw(refreshBalances(data));
      }
      setSyncState("ready");
    };
    const errorCallback = () => {
      setSyncState("error");
    };
    registryRef.on("value", callback, errorCallback);
    return () => registryRef.off("value", callback);
  }, []);

  // setRegistry: aktualisiert lokalen State sofort UND schreibt nach Firebase.
  function setRegistry(updater) {
    setRegistryRaw(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (registryRef) {
        registryRef.set(next).catch(() => setSyncState("error"));
      }
      return next;
    });
  }

  // Berechne aktuelle Spielstände basierend auf aktiver Historie
  const { scores: currentScores, consecutiveRaus } = calculateScoresFromRounds(gamePlayers, gameRounds);

  function addPlayer() {
    if (!newName.trim()) return;
    setRegistry([...registry, { id: uid(), name: newName.trim(), games: [], session: { balance: 0 } }]);
    setNewName("");
  }

  function deletePlayer(id) {
    if (window.confirm("Spieler wirklich löschen?")) {
      setRegistry(prev => refreshBalances(prev.filter(p => p.id !== id)));
      setSelectedIds(prev => prev.filter(selId => selId !== id));
    }
  }

  function startGame() {
    if (selectedIds.length < 2) return;
    const gp = selectedIds.map(id => registry.find(p => p.id === id));
    setGamePlayers(gp);
    setGameRounds([]);
    setDealerIdx(0);
    setSelectedTrump(SUITS[0]);
    initRound(gp, SUITS[0]);
    setScreen("game");
  }

  function initRound(playersList, trump) {
    setRoundPhase("setup");
    const initialStatus = {};
    const initialTricks = {};
    playersList.forEach(p => {
      initialTricks[p.id] = 0;
      initialStatus[p.id] = "mit"; 
    });
    setPlayerStatus(initialStatus);
    setPlayerTricks(initialTricks);
  }

  function getForcedReason(player, idx, trump, overrideScores = currentScores, overrideRaus = consecutiveRaus) {
    if (trump.id === "eichel") return "🌰 Eichel-Runde Pflicht";
    if (overrideScores[idx] <= 6) return "⚠️ Punkte ≤ 6 Pflicht";
    if (overrideRaus[player.id] >= 2) return "🚨 3. Mal Pflicht";
    return null;
  }

  function handleTrumpChange(trump) {
    setSelectedTrump(trump);
    if (trump.id === "eichel") {
      const updatedStatus = { ...playerStatus };
      gamePlayers.forEach(p => { updatedStatus[p.id] = "mit"; });
      setPlayerStatus(updatedStatus);
    }
  }

  function proceedToTricks() {
    let updatedStatus = { ...playerStatus };
    gamePlayers.forEach((p, idx) => {
      if (getForcedReason(p, idx, selectedTrump)) {
        updatedStatus[p.id] = "mit";
      }
    });
    setPlayerStatus(updatedStatus);

    if (!Object.values(updatedStatus).includes("mit")) {
      alert("Es muss mindestens ein Spieler mitgehen!");
      return;
    }
    
    const updatedTricks = { ...playerTricks };
    gamePlayers.forEach(p => {
      if (updatedStatus[p.id] === "raus") updatedTricks[p.id] = 0;
    });
    setPlayerTricks(updatedTricks);
    setRoundPhase("tricks");
  }

  function getTotalTricksEntered(tricksObj, statusObj) {
    return gamePlayers.reduce((sum, p) => {
      return sum + (statusObj[p.id] === "mit" ? (tricksObj[p.id] || 0) : 0);
    }, 0);
  }

  function evaluateRound() {
    const total = getTotalTricksEntered(playerTricks, playerStatus);
    if (total !== 6) {
      alert(`Es müssen genau 6 Stiche verteilt werden! Aktuell verteilt: ${total}`);
      return;
    }

    const newRoundData = {
      roundNum: gameRounds.length + 1,
      trump: selectedTrump,
      playerStatus: { ...playerStatus },
      playerTricks: { ...playerTricks },
      dealerIdx: dealerIdx
    };

    const updatedRounds = [...gameRounds, newRoundData];
    const { scores: nextScores } = calculateScoresFromRounds(gamePlayers, updatedRounds);

    setGameRounds(updatedRounds);

    const hasWinner = nextScores.some(s => s <= 0);
    if (hasWinner) {
      let winnerIdx = 0;
      let minScore = nextScores[0];
      nextScores.forEach((s, idx) => {
        if (s < minScore) { minScore = s; winnerIdx = idx; }
      });
      
      // Kappe alle Minusstände für die Historie/Abrechnung auf exakt 0
      const clampedScores = nextScores.map(s => s < 0 ? 0 : s);
      saveGameResult(clampedScores, winnerIdx, updatedRounds);
    } else {
      setDealerIdx(d => (d + 1) % gamePlayers.length);
      setSelectedTrump(SUITS[0]);
      setRoundPhase("setup");
      
      const freshStatus = {};
      const freshTricks = {};
      gamePlayers.forEach(p => {
        freshStatus[p.id] = "mit";
        freshTricks[p.id] = 0;
      });
      setPlayerStatus(freshStatus);
      setPlayerTricks(freshTricks);
    }
  }

  function saveGameResult(finalScores, winnerIdx, finishedRounds) {
    const gameId = uid();
    const timestamp = new Date().toISOString();
    
    const losers = gamePlayers.map((p, i) => ({ id: p.id, pts: finalScores[i], idx: i })).filter(p => p.idx !== winnerIdx);
    const totalPrizeMoney = losers.reduce((sum, l) => sum + (l.pts * CENT_PER_POINT), 0);
    
    setRegistry(prev => {
      const updated = prev.map(p => {
        const gpIdx = gamePlayers.findIndex(gp => gp.id === p.id);
        if (gpIdx === -1) return p; 
        
        const won = gpIdx === winnerIdx;
        const moneyDelta = won ? totalPrizeMoney : -(finalScores[gpIdx] * CENT_PER_POINT);
        
        return {
          ...p,
          games: [...(p.games || []), {
            id: gameId, timestamp, date: new Date().toLocaleDateString("de-DE"),
            players: gamePlayers.map(g => ({ id: g.id, name: g.name })),
            finalScores: [...finalScores],
            winnerIdx,
            won, moneyDelta
          }]
        };
      });
      return refreshBalances(updated);
    });
    
    alert(`Spiel beendet! 🏆 ${gamePlayers[winnerIdx].name} hat gewonnen!`);
    setScreen("home");
  }

  function saveEditedRound(rIdx, editedStatus, editedTricks) {
    const total = gamePlayers.reduce((sum, p) => sum + (editedStatus[p.id] === "mit" ? (editedTricks[p.id] || 0) : 0), 0);
    if (total !== 6) {
      alert(`Fehler: Eine Runde muss immer genau 6 Stiche haben! (Aktuell: ${total})`);
      return;
    }

    const updatedRounds = [...gameRounds];
    updatedRounds[rIdx] = {
      ...updatedRounds[rIdx],
      playerStatus: editedStatus,
      playerTricks: editedTricks
    };

    setGameRounds(updatedRounds);
    setEditingRoundIdx(null);
  }

  // Korrektur eines ALTEN, bereits beendeten Spiels aus der Historie
  function saveEditedPastGame(gameId) {
    let hasValidationError = false;
    
    setRegistry(prev => {
      const updated = prev.map(p => {
        const gameIdx = (p.games || []).findIndex(g => g.id === gameId);
        if (gameIdx === -1) return p;

        const game = p.games[gameIdx];
        
        // Hole alle eingetragenen Punkte ab
        const enteredScores = game.players.map(pl => parseInt(editScores[pl.id]) || 0);
        
        // VALIDIERUNG: Mindestens ein Spieler muss 0 (oder weniger) Punkte haben
        if (!enteredScores.some(s => s <= 0)) {
          hasValidationError = true;
          return p;
        }
        
        // Finde den wahren Gewinner (kleinster Wert vor der Kappung)
        let newWinnerIdx = 0;
        let minS = enteredScores[0];
        enteredScores.forEach((s, i) => {
          if (s < minS) { minS = s; newWinnerIdx = i; }
        });

        // Alle Minuswerte für das Endergebnis auf 0 kappen
        const newFinalScores = enteredScores.map(s => s < 0 ? 0 : s);

        const myGpIdx = game.players.findIndex(x => x.id === p.id);
        const won = myGpIdx === newWinnerIdx;
        
        const losers = game.players.map((pl, i) => ({ pts: newFinalScores[i], idx: i })).filter(l => l.idx !== newWinnerIdx);
        const totalPrizeMoney = losers.reduce((sum, l) => sum + (l.pts * CENT_PER_POINT), 0);
        const moneyDelta = won ? totalPrizeMoney : -(newFinalScores[myGpIdx] * CENT_PER_POINT);

        const updatedGames = [...p.games];
        updatedGames[gameIdx] = {
          ...game,
          finalScores: newFinalScores,
          winnerIdx: newWinnerIdx,
          won, moneyDelta
        };

        return { ...p, games: updatedGames };
      });

      if (hasValidationError) return prev; // Keine Änderungen vornehmen
      return refreshBalances(updated);
    });

    if (hasValidationError) {
      alert("Fehler beim Speichern: Ein beendetes Spiel benötigt zwingend einen Gewinner mit genau 0 Punkten! Bitte korrigiere deine Eingabe.");
      return;
    }

    setEditingGameId(null);
    setEditScores({});
  }

  function getUniqueGames() {
    const allGamesMap = new Map();
    registry.forEach(p => {
      (p.games || []).forEach(g => { if (!allGamesMap.has(g.id)) allGamesMap.set(g.id, g); });
    });
    return Array.from(allGamesMap.values()).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
  }

  const sortedLeaderboard = [...registry].sort((a, b) => (b.session?.balance || 0) - (a.session?.balance || 0));
  const btnStyle = { padding: "14px 20px", borderRadius: "12px", border: "none", cursor: "pointer", fontWeight: "900", fontSize: "15px", color: "#fff", transition: "all 0.2s", textTransform: "uppercase", letterSpacing: "1px" };

  if (syncState === "loading") {
    return (
      <div style={{ position: "relative", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <BackgroundEffects />
        <div style={{ position: "relative", zIndex: 10, textAlign: "center" }}>
          <div className="neon-text" style={{ fontSize: "2rem" }}>🃏 20 AB</div>
          <div style={{ marginTop: "15px", color: "#aaa", fontSize: "14px" }}>Lade gemeinsamen Spielstand…</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ position: "relative", minHeight: "100vh" }}>
      <BackgroundEffects />
      <div style={{ padding: "15px", maxWidth: "600px", margin: "0 auto", position: "relative", zIndex: 10 }}>
        
        <h1 className="neon-text" onClick={() => setScreen("home")} style={{ cursor: "pointer", margin: "15px 0 5px 0" }}>🃏 20 AB</h1>
        <div style={{ textAlign: "center", marginBottom: "20px", fontSize: "11px", color: syncState === "error" ? "#ff4e50" : "#43e97b", letterSpacing: "1px" }}>
          {syncState === "error"
            ? `⚠️ Sync-Fehler${firebaseInitError ? " — " + firebaseInitError : " — Änderung evtl. nicht gespeichert"}`
            : "● Live verbunden (Firebase)"}
        </div>

        {screen !== "home" && (
          <button style={{ ...btnStyle, padding: "8px 15px", fontSize: "13px", background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", marginBottom: "15px" }} onClick={() => setScreen("home")}>
            ← HAUPTMENÜ
          </button>
        )}

        {/* HOME SCREEN */}
        {screen === "home" && (
          <div>
            <div className="glass" style={{ padding: "20px", textAlign: "center" }}>
              <button className="pulse-btn" style={{ ...btnStyle, background: "linear-gradient(45deg, #00f2fe, #4facfe)", width: "100%", marginBottom: "15px", boxShadow: "0 0 15px #00f2fe" }} onClick={() => setScreen("select")}>
                🎴 Neues Spiel starten
              </button>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
                <button style={{ ...btnStyle, background: "linear-gradient(45deg, #f093fb, #f5576c)" }} onClick={() => setScreen("players")}>👤 Spieler</button>
                <button style={{ ...btnStyle, background: "linear-gradient(45deg, #f9d423, #ff4e50)" }} onClick={() => setScreen("history")}>🕰️ alte Spiele</button>
              </div>
            </div>

            <div className="glass" style={{ padding: "20px" }}>
              <h2 style={{ textAlign: "center", color: "#f9d423", marginBottom: "15px", fontSize: "20px" }}>🏆 BESTENLISTE</h2>
              <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                {sortedLeaderboard.map((p, index) => (
                  <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 15px", background: index < 3 ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.3)", borderRadius: "10px", border: index === 0 ? "1px solid #f9d423" : "1px solid transparent" }}>
                    <span style={{ fontSize: "16px", fontWeight: "bold" }}>
                      <span style={{ marginRight: "8px" }}>{index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : "⚫"}</span> 
                      {p.name}
                    </span>
                    <span style={{ fontWeight: "900", color: (p.session?.balance || 0) >= 0 ? "#43e97b" : "#ff4e50", fontSize: "16px" }}>
                      {euro(p.session?.balance || 0)}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* IN-GAME SCREEN */}
        {screen === "game" && (
          <div>
            <div className="glass" style={{ padding: "20px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px", borderBottom: "1px solid rgba(255,255,255,0.1)", paddingBottom: "10px" }}>
                <span style={{ fontSize: "20px", fontWeight: "bold", color: "#00f2fe" }}>🔥 Runde {gameRounds.length + 1}</span>
                <span style={{ fontSize: "14px", color: "#ccc" }}>Geber: <strong style={{color:"#f9d423"}}>{gamePlayers[dealerIdx]?.name}</strong></span>
              </div>

              {/* Punkte-Tafel */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "25px" }}>
                {gamePlayers.map((p, i) => (
                  <div key={p.id} style={{ padding: "12px", background: "rgba(0,0,0,0.4)", borderRadius: "10px", textAlign: "center", border: i === dealerIdx ? "1px solid #f9d423" : "1px solid rgba(255,255,255,0.05)" }}>
                    <div style={{ fontSize: "14px", color: "#aaa" }}>
                      {p.name} {currentScores[i] <= 3 && <span style={{ color: "#ff4e50" }}>🚫🔄</span>}
                    </div>
                    {/* Live-Kappung auf 0 in der Punkte-Tafel */}
                    <div style={{ fontSize: "28px", fontWeight: "900", color: currentScores[i] <= 3 ? "#ff0844" : currentScores[i] <= 7 ? "#ffb199" : "#00f2fe" }}>
                      {currentScores[i] < 0 ? 0 : currentScores[i]}
                    </div>
                  </div>
                ))}
              </div>

              {/* PHASE 1: TRUMPF & STATUS */}
              {roundPhase === "setup" && (
                <div>
                  <h3 style={{ color: "#f9d423", marginBottom: "10px", fontSize: "15px" }}>1. Trumpf auswählen:</h3>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "8px", marginBottom: "20px" }}>
                    {SUITS.map(s => (
                      <button key={s.id} onClick={() => handleTrumpChange(s)} style={{ ...btnStyle, padding: "10px 5px", fontSize: "13px", background: selectedTrump.id === s.id ? s.color : "rgba(0,0,0,0.4)", border: selectedTrump.id === s.id ? "2px solid #fff" : "none" }}>
                        {s.emoji} {s.label}
                      </button>
                    ))}
                  </div>

                  <h3 style={{ color: "#f9d423", marginBottom: "10px", fontSize: "15px" }}>2. Wer geht mit?</h3>
                  {gamePlayers.map((p, idx) => {
                    const forcedReason = getForcedReason(p, idx, selectedTrump);
                    const isForced = forcedReason !== null;
                    const currentStatus = isForced ? "mit" : (playerStatus[p.id] || "mit");

                    return (
                      <div key={p.id} style={{ display: "flex", flexDirection: "column", padding: "10px", background: "rgba(255,255,255,0.05)", borderRadius: "8px", marginBottom: "8px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <span style={{ fontWeight: "bold" }}>{p.name} {currentScores[idx] <= 3 && <span style={{ color: "#ff4e50", fontSize: "11px" }}>🚫🔄</span>}</span>
                          <div style={{ display: "flex", gap: "5px" }}>
                            <button onClick={() => !isForced && setPlayerStatus({ ...playerStatus, [p.id]: "mit" })} style={{ padding: "6px 14px", borderRadius: "6px", border: "none", fontWeight: "bold", background: currentStatus === "mit" ? "#43e97b" : "rgba(0,0,0,0.3)", color: currentStatus === "mit" ? "#000" : "#fff" }}>Mit</button>
                            <button onClick={() => !isForced && setPlayerStatus({ ...playerStatus, [p.id]: "raus" })} disabled={isForced} style={{ padding: "6px 14px", borderRadius: "6px", border: "none", fontWeight: "bold", background: currentStatus === "raus" ? "#ff4e50" : "rgba(0,0,0,0.3)", color: "#fff", opacity: isForced ? 0.2 : 1 }}>Raus</button>
                          </div>
                        </div>
                        {isForced && <div style={{ fontSize: "11px", color: "#ffb199", marginTop: "4px" }}>{forcedReason}</div>}
                      </div>
                    );
                  })}
                  <button onClick={proceedToTricks} style={{ ...btnStyle, background: "linear-gradient(45deg, #00f2fe, #4facfe)", width: "100%", marginTop: "15px" }}>Stiche eintragen →</button>
                </div>
              )}

              {/* PHASE 2: STICHE EINTRAGEN */}
              {roundPhase === "tricks" && (
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "15px" }}>
                    <h3 style={{ color: "#f9d423", fontSize: "16px" }}>Stiche ({selectedTrump.emoji}):</h3>
                    <span style={{ fontWeight: "900", color: getTotalTricksEntered(playerTricks, playerStatus) === 6 ? "#43e97b" : "#ff4e50" }}>
                      Verteilt: {getTotalTricksEntered(playerTricks, playerStatus)} / 6
                    </span>
                  </div>
                  
                  {gamePlayers.map((p, idx) => {
                    const forced = getForcedReason(p, idx, selectedTrump);
                    const status = forced ? "mit" : playerStatus[p.id];

                    if (status === "raus") {
                      return (
                        <div key={p.id} style={{ padding: "10px 12px", background: "rgba(0,0,0,0.2)", borderRadius: "8px", marginBottom: "6px", opacity: 0.5 }}>
                          <span>{p.name} - <i style={{color: "#ff4e50"}}>Raus gegangen</i></span>
                        </div>
                      );
                    }
                    return (
                      <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", background: "rgba(255,255,255,0.05)", borderRadius: "8px", marginBottom: "6px" }}>
                        <span style={{ fontWeight: "bold" }}>{p.name}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                          <button onClick={() => setPlayerTricks({ ...playerTricks, [p.id]: Math.max(0, (playerTricks[p.id] || 0) - 1) })} style={{ width: "32px", height: "32px", borderRadius: "5px", border: "none", background: "#fff", fontWeight: "bold" }}>-</button>
                          <span style={{ fontSize: "20px", fontWeight: "900", minWidth: "25px", textAlign: "center" }}>{playerTricks[p.id] || 0}</span>
                          <button onClick={() => {
                            if(getTotalTricksEntered(playerTricks, playerStatus) < 6) {
                              setPlayerTricks({ ...playerTricks, [p.id]: (playerTricks[p.id] || 0) + 1 });
                            }
                          }} style={{ width: "32px", height: "32px", borderRadius: "5px", border: "none", background: "#fff", fontWeight: "bold" }}>+</button>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{ display: "flex", gap: "10px", marginTop: "20px" }}>
                    <button onClick={() => setRoundPhase("setup")} style={{ ...btnStyle, background: "rgba(255,255,255,0.1)", flex: 1 }}>Zurück</button>
                    <button onClick={evaluateRound} style={{ ...btnStyle, background: "linear-gradient(45deg, #43e97b, #38f9d7)", color: "#000", flex: 2 }}>Runde auswerten ✓</button>
                  </div>
                </div>
              )}
            </div>

            {/* RUNDEN-HISTORIE DES LAUFENDEN SPIELS */}
            {gameRounds.length > 0 && (
              <div className="glass" style={{ padding: "20px" }}>
                <h3 style={{ color: "#f093fb", marginBottom: "15px", fontSize: "16px" }}>🛠️ Vergangene Runden dieser Partie korrigieren:</h3>
                {gameRounds.map((r, rIdx) => (
                  <div key={rIdx} style={{ background: "rgba(0,0,0,0.3)", padding: "12px", borderRadius: "10px", marginBottom: "10px", border: "1px solid rgba(255,255,255,0.05)" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
                      <strong style={{ color: "#00f2fe" }}>Runde {r.roundNum} ({r.trump.emoji})</strong>
                      {editingRoundIdx !== rIdx ? (
                        <button onClick={() => setEditingRoundIdx(rIdx)} style={{ background: "none", border: "none", color: "#f9d423", cursor: "pointer", fontSize: "14px" }}>✏️ Bearbeiten</button>
                      ) : (
                        <span style={{ fontSize: "12px", color: "#43e97b" }}>Wird editiert...</span>
                      )}
                    </div>

                    {editingRoundIdx !== rIdx ? (
                      <div style={{ fontSize: "13px", color: "#ccc" }}>
                        {gamePlayers.map(p => {
                          const st = r.playerStatus[p.id] || "mit";
                          return (
                            <span key={p.id} style={{ marginRight: "12px" }}>
                              {p.name}: {st === "raus" ? "❌ Raus" : `🎮 ${r.playerTricks[p.id] || 0} St.`}
                            </span>
                          );
                        })}
                      </div>
                    ) : (
                      <RoundInlineEditor 
                        gamePlayers={gamePlayers} 
                        roundData={r} 
                        onSave={(edStatus, edTricks) => saveEditedRound(rIdx, edStatus, edTricks)}
                        onCancel={() => setEditingRoundIdx(null)}
                      />
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* HISTORIE SCREEN (ALTE SPIELE) */}
        {screen === "history" && (
          <div>
            <h2 style={{ color: "#f9d423", marginBottom: "20px" }}>🕰️ Spielhistorie</h2>
            {getUniqueGames().map(g => (
              <div key={g.id} className="glass" style={{ padding: "15px", borderLeft: "5px solid #00f2fe", background: "rgba(0,0,0,0.4)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "10px", fontSize: "13px", color: "#aaa" }}>
                  <span>{g.date}</span>
                  {editingGameId !== g.id && (
                    <button onClick={() => {
                      setEditingGameId(g.id);
                      const initialScores = {};
                      g.players.forEach((p, idx) => { initialScores[p.id] = g.finalScores[idx]; });
                      setEditScores(initialScores);
                    }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "14px" }}>✏️ Endpunkte korrigieren</button>
                  )}
                </div>

                {editingGameId !== g.id ? (
                  <div>
                    {g.players.map((p, i) => {
                      const regPlayer = registry.find(rp => rp.id === p.id);
                      const specificGame = regPlayer?.games?.find(rg => rg.id === g.id);
                      return (
                        <div key={p.id} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
                          <span>{g.winnerIdx === i ? "🏆" : ""} {p.name} <span style={{ color: "#aaa", fontSize: "13px" }}>({g.finalScores[i]} Pkt)</span></span>
                          <span style={{ color: (specificGame?.moneyDelta || 0) >= 0 ? "#43e97b" : "#ff4e50", fontWeight: "bold" }}>
                            {euro(specificGame?.moneyDelta || 0)}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div style={{ background: "rgba(0,0,0,0.5)", padding: "10px", borderRadius: "8px" }}>
                    {g.players.map((p) => (
                      <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
                        <span>{p.name}:</span>
                        <input type="number" value={editScores[p.id] || 0} onChange={e => setEditScores({ ...editScores, [p.id]: e.target.value })} style={{ width: "70px", padding: "5px", borderRadius: "5px", border: "1px solid #ccc", background: "#000", color: "#fff", textAlign: "center" }} />
                      </div>
                    ))}
                    <div style={{ display: "flex", gap: "8px", marginTop: "10px" }}>
                      <button onClick={() => setEditingGameId(null)} style={{ ...btnStyle, padding: "6px 12px", fontSize: "12px", background: "#aaa" }}>Abbrechen</button>
                      <button onClick={() => saveEditedPastGame(g.id)} style={{ ...btnStyle, padding: "6px 12px", fontSize: "12px", background: "#43e97b", color: "#000" }}>Speichern & Synchronisieren</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* SPIELER SCREEN */}
        {screen === "players" && (
          <div className="glass" style={{ padding: "25px" }}>
            <h3 style={{ marginBottom: "20px", color: "#f093fb" }}>👤 Spieler verwalten</h3>
            <div style={{ display: "flex", gap: "10px", marginBottom: "25px" }}>
              <input value={newName} onChange={e => setNewName(e.target.value)} style={{ flex: 1, padding: "12px", borderRadius: "12px", border: "1px solid #f093fb", background: "rgba(0,0,0,0.3)", color: "#fff", fontSize: "16px" }} placeholder="Spielername..." />
              <button onClick={addPlayer} style={{ ...btnStyle, background: "linear-gradient(45deg, #f093fb, #f5576c)", padding: "0 20px", fontSize: "20px" }}>+</button>
            </div>
            <div>
              {registry.map(p => (
                <div key={p.id} style={{ padding: "12px 15px", background: "rgba(0,0,0,0.4)", marginBottom: "10px", borderRadius: "12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: "16px", fontWeight: "bold" }}>{p.name}</span> 
                  <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                    <span style={{ color: (p.session?.balance || 0) >= 0 ? "#43e97b" : "#ff4e50", fontWeight: "bold" }}>{euro(p.session?.balance || 0)}</span>
                    <button onClick={() => deletePlayer(p.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "18px" }}>🗑️</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* SPIELER AUSWAHL SCREEN */}
        {screen === "select" && (
          <div className="glass" style={{ padding: "25px" }}>
            <h3 style={{ marginBottom: "20px", color: "#00f2fe" }}>🎴 Wer spielt mit?</h3>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              {registry.map(p => (
                <div key={p.id} onClick={() => setSelectedIds(prev => prev.includes(p.id) ? prev.filter(id=>id!==p.id) : [...prev, p.id])} 
                     style={{ padding: "15px", textAlign: "center", fontWeight: "bold", background: selectedIds.includes(p.id) ? "linear-gradient(45deg, #00f2fe, #4facfe)" : "rgba(0,0,0,0.4)", border: selectedIds.includes(p.id) ? "none" : "1px solid rgba(255,255,255,0.15)", borderRadius: "12px", cursor: "pointer" }}>
                  {p.name}
                </div>
              ))}
            </div>
            <button onClick={startGame} className="pulse-btn" style={{ ...btnStyle, background: "linear-gradient(45deg, #f9d423, #ff4e50)", width: "100%", marginTop: "25px", opacity: selectedIds.length < 2 ? 0.4 : 1 }} disabled={selectedIds.length < 2}>
              🚀 SPIEL STARTEN
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

// Sub-Komponente für die Inline-Korrektur laufender Runden
function RoundInlineEditor({ gamePlayers, roundData, onSave, onCancel }) {
  const [status, setStatus] = useState({ ...roundData.playerStatus });
  const [tricks, setTricks] = useState({ ...roundData.playerTricks });

  const total = gamePlayers.reduce((sum, p) => sum + (status[p.id] === "mit" ? (tricks[p.id] || 0) : 0), 0);

  return (
    <div style={{ background: "rgba(255,255,255,0.05)", padding: "10px", borderRadius: "8px", marginTop: "5px" }}>
      <div style={{ textAlign: "right", fontSize: "12px", marginBottom: "10px", color: total === 6 ? "#43e97b" : "#ff4e50" }}>
        Stiche: {total} / 6
      </div>
      {gamePlayers.map(p => (
        <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px", borderBottom: "1px solid rgba(255,255,255,0.05)", paddingBottom: "5px" }}>
          <span style={{ fontSize: "14px" }}>{p.name}</span>
          <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
            <select value={status[p.id] || "mit"} onChange={e => {
              const s = e.target.value;
              setStatus({ ...status, [p.id]: s });
              if (s === "raus") setTricks({ ...tricks, [p.id]: 0 });
            }} style={{ background: "#000", color: "#fff", padding: "4px", border: "1px solid #555", borderRadius: "4px" }}>
              <option value="mit">Mit</option>
              <option value="raus">Raus</option>
            </select>
            
            {status[p.id] !== "raus" && (
              <input type="number" min="0" max="6" value={tricks[p.id] || 0} onChange={e => setTricks({ ...tricks, [p.id]: parseInt(e.target.value) || 0 })} style={{ width: "45px", textAlign: "center", background: "#000", color: "#fff", border: "1px solid #555", borderRadius: "4px", padding: "4px" }} />
            )}
          </div>
        </div>
      ))}
      <div style={{ display: "flex", gap: "6px", marginTop: "10px" }}>
        <button onClick={onCancel} style={{ padding: "4px 8px", background: "#888", border: "none", color: "#fff", borderRadius: "4px", cursor: "pointer" }}>Abbrechen</button>
        <button onClick={() => onSave(status, tricks)} style={{ padding: "4px 8px", background: "#43e97b", border: "none", color: "#000", fontWeight: "bold", borderRadius: "4px", cursor: "pointer" }}>Übernehmen</button>
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>
